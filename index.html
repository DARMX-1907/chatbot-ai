<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Voice</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #343541;
    color: white;
}

.chat-container {
    max-width: 600px;
    margin: auto;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 15px;
    text-align: center;
    background: #202123;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.msg {
    margin: 10px 0;
}

.user { text-align: right; color: #58a6ff; }
.bot { text-align: left; color: #e6e6e6; }

.input-area {
    display: flex;
    padding: 10px;
    background: #202123;
}

.input-area input {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 5px;
}

.input-area button {
    margin-left: 5px;
    padding: 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.send { background: #19c37d; color: white; }
.mic { background: #ff4d4d; color: white; }
</style>
</head>

<body>

<div class="chat-container">
    <div class="header">🎤 AI Voice Chatbot (Gemini)</div>

    <div id="chat" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Ketik atau ngomong...">
        <button class="send" onclick="send()">Kirim</button>
        <button class="mic" onclick="startVoice()">🎤</button>
    </div>
</div>

<script>
const API_KEY = "PASTE_API_KEY_KAMU";

let history = [];
const systemPrompt = "Kamu adalah asisten AI yang membantu tugas siswa secara jelas dan singkat.";

function addMsg(text, type) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send(textFromVoice = null) {
    const input = document.getElementById("input");
    const text = textFromVoice || input.value;

    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    addMsg("Mengetik...", "bot");

    history.push({ role: "user", text });

    try {
        const response = await fetch(
            "https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=" + API_KEY,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [
                        { parts: [{ text: systemPrompt }] },
                        ...history.map(h => ({
                            parts: [{ text: h.text }]
                        }))
                    ]
                })
            }
        );

        const data = await response.json();
        document.querySelector(".bot:last-child").remove();

        let reply = data.candidates[0].content.parts[0].text;
        addMsg(reply, "bot");

        history.push({ role: "bot", text: reply });

    } catch {
        addMsg("Error koneksi AI", "bot");
    }
}

// 🎤 VOICE INPUT
function startVoice() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Browser tidak support voice input 😢 (pakai Chrome)");
        return;
    }

    const recognition = new SpeechRecognition();
    recognition.lang = "id-ID";
    recognition.start();

    recognition.onstart = () => {
        addMsg("🎤 Mendengarkan...", "bot");
    };

    recognition.onresult = (event) => {
        let text = event.results[0][0].transcript;
        send(text);
    };

    recognition.onerror = () => {
        addMsg("Gagal mengenali suara", "bot");
    };
}
</script>

</body>
</html>
