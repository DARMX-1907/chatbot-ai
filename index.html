<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Premium</title>
<style>
body { margin: 0; font-family: Arial; }

.chat-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #1a73e8, #19c37d);
    width: 65px;
    height: 65px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    color: white;
    font-size: 26px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}
.chat-toggle:hover { transform: scale(1.1); }

.chatbox {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 350px;
    height: 500px;
    backdrop-filter: blur(15px);
    background: rgba(40,40,40,0.85);
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: scale(0);
    transform-origin: bottom right;
    transition: 0.3s ease;
}
.chatbox.active { transform: scale(1); }

.header {
    padding: 12px;
    text-align: center;
    background: rgba(0,0,0,0.5);
    color: white;
}

.chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg { margin: 8px 0; }
.user { text-align: right; color: #58a6ff; }
.bot { text-align: left; color: #e6e6e6; }

.input-area {
    display: flex;
    padding: 8px;
}

.input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

.input-area button {
    margin-left: 5px;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.send { background: #19c37d; color: white; }
.mic { background: #ff4d4d; color: white; }
</style>
</head>

<body>

<!-- 🔘 Floating Button -->
<div class="chat-toggle" onclick="toggleChat()">💬</div>

<!-- 💬 Chatbox -->
<div id="chatbox" class="chatbox">
    <div class="header">✨ AI Assistant</div>
    <div id="chat" class="chat"></div>
    <div class="input-area">
        <input id="input" placeholder="Ketik atau bicara..." onkeydown="if(event.key==='Enter') send()">
        <button class="send" onclick="send()">➤</button>
        <button class="mic" onclick="voice()">🎤</button>
    </div>
</div>

<script>
// ⚠️ GANTI dengan URL Railway Anda, contoh: https://myapp.up.railway.app
const SERVER_URL = "https:chatbot-backend-production-540f.up.railway.app";

let speaking = true;

function toggleChat() {
    document.getElementById("chatbox").classList.toggle("active");
}

function addMsg(text, type) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

function speak(text) {
    if (!speaking) return;
    let utter = new SpeechSynthesisUtterance(text);
    utter.lang = "id-ID";
    speechSynthesis.speak(utter);
}

// ✅ Fungsi send yang benar — hanya satu, tidak ada duplikat
async function send(textVoice = null) {
    let input = document.getElementById("input");
    let text = textVoice || input.value.trim();

    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    let typingMsg = addMsg("Mengetik...", "bot");

    try {
        const res = await fetch(`${SERVER_URL}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();

        typingMsg.remove();

        // ✅ Format sesuai response dari Express server (data.reply)
        let reply = data.reply || "Tidak ada respons dari AI.";
        addMsg(reply, "bot");
        speak(reply);

    } catch (err) {
        typingMsg.remove();
        addMsg("❌ Error: " + err.message, "bot");
        console.error(err);
    }
}

function voice() {
    let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Browser tidak support voice recognition 😢");
        return;
    }

    let recog = new SpeechRecognition();
    recog.lang = "id-ID";
    recog.start();

    let listeningMsg = addMsg("🎤 Mendengarkan...", "bot");

    recog.onresult = e => {
        listeningMsg.remove();
        let text = e.results[0][0].transcript;
        send(text);
    };

    recog.onerror = () => {
        listeningMsg.remove();
        addMsg("❌ Gagal mendengar, coba lagi.", "bot");
    };
}
</script>

</body>
</html>
