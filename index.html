<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant - Kelas</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #0f0f1a;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ===== HEADER ===== */
.header {
    padding: 14px 20px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-bottom: 1px solid rgba(99,102,241,0.2);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
}
.header-logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.header-logo svg { width: 22px; height: 22px; fill: white; }
.header-title { color: white; font-size: 15px; font-weight: 600; }
.header-status { color: #4ade80; font-size: 12px; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
.status-dot {
    width: 7px; height: 7px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}

/* ===== CHAT AREA ===== */
.chat {
    flex: 1;
    padding: 16px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scrollbar-width: thin;
    scrollbar-color: rgba(99,102,241,0.3) transparent;
}
.chat::-webkit-scrollbar { width: 4px; }
.chat::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 4px; }

/* Welcome message */
.welcome {
    text-align: center;
    padding: 30px 20px;
    color: #64748b;
}
.welcome-icon {
    width: 60px; height: 60px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 14px;
}
.welcome-icon svg { width: 32px; height: 32px; fill: white; }
.welcome h3 { color: #e2e8f0; font-size: 16px; margin-bottom: 6px; }
.welcome p { font-size: 13px; line-height: 1.6; }

/* ===== MESSAGES ===== */
.msg {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 80%;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }

.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }

.msg-avatar {
    width: 30px; height: 30px;
    border-radius: 9px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.msg-avatar svg { width: 16px; height: 16px; fill: white; }

.msg-bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
}
.msg.user .msg-bubble {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border-bottom-right-radius: 4px;
}
.msg.bot .msg-bubble {
    background: #1e1e2e;
    color: #e2e8f0;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(99,102,241,0.15);
}

.typing { display: flex; gap: 4px; padding: 4px 2px; }
.typing span {
    width: 7px; height: 7px;
    background: #6366f1;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
}

/* ===== INPUT AREA ===== */
.input-area {
    padding: 14px 20px;
    background: #0f0f1a;
    border-top: 1px solid rgba(99,102,241,0.15);
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
}
.input-area input {
    flex: 1;
    padding: 12px 16px;
    border-radius: 14px;
    border: 1px solid rgba(99,102,241,0.25);
    background: #1e1e2e;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}
.input-area input::placeholder { color: #64748b; }
.input-area input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

.btn {
    width: 44px; height: 44px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    flex-shrink: 0;
}
.btn:hover { transform: scale(1.08); }
.btn svg { width: 19px; height: 19px; }
.btn-send { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
.btn-send svg { fill: white; }
.btn-mic { background: #1e1e2e; border: 1px solid rgba(99,102,241,0.25); }
.btn-mic svg { fill: #f87171; }
.btn-mic.listening { background: #f87171; border-color: #f87171; }
.btn-mic.listening svg { fill: white; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div class="header-logo">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
    </div>
    <div style="flex:1">
        <div class="header-title">AI Assistant</div>
        <div class="header-status"><span class="status-dot"></span> Online & Siap Membantu</div>
    </div>
    <button id="soundBtn" onclick="toggleSound()" style="background:rgba(99,102,241,0.2);border:1px solid rgba(99,102,241,0.3);border-radius:10px;width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:0.2s;" title="Toggle Suara">
        <svg id="soundIcon" viewBox="0 0 24 24" width="18" height="18" fill="#4ade80"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
    </button>
</div>

<!-- Chat -->
<div id="chat" class="chat">
    <div class="welcome">
        <div class="welcome-icon">
            <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 11H7v-2h10v2zm0-3H7V8h10v2z"/></svg>
        </div>
        <h3>Halo! Saya AI Assistant 👋</h3>
        <p>Silakan ketik pertanyaan Anda<br>dan saya akan membantu!</p>
    </div>
</div>

<!-- Input -->
<div class="input-area">
    <input id="input" placeholder="Ketik pesan Anda..." onkeydown="if(event.key==='Enter') send()">
    <button class="btn btn-mic" id="micBtn" onclick="voice()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93H2c0 4.42 3.05 8.12 7 9.29V21h2v-3.07c.33.05.66.07 1 .07s.67-.02 1-.07V21h2v-3.78c3.95-1.17 7-4.87 7-9.22h-2c0 4.08-3.06 7.44-7 7.93z"/></svg>
    </button>
    <button class="btn btn-send" onclick="send()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
</div>

<script>
const SERVER_URL = "https://chatbot-backend-production-540f.up.railway.app";
let speaking = true;

function toggleSound() {
    speaking = !speaking;
    speechSynthesis.cancel(); // hentikan suara yang sedang berjalan
    const icon = document.getElementById("soundIcon");
    const btn = document.getElementById("soundBtn");
    if (speaking) {
        icon.setAttribute("fill", "#4ade80");
        icon.innerHTML = `<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>`;
        btn.style.borderColor = "rgba(99,102,241,0.3)";
    } else {
        icon.setAttribute("fill", "#f87171");
        icon.innerHTML = `<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>`;
        btn.style.borderColor = "rgba(248,113,113,0.5)";
    }
}

function addMsg(text, type, isTyping = false) {
    const chat = document.getElementById("chat");

    // Hapus welcome message saat pesan pertama
    const welcome = chat.querySelector(".welcome");
    if (welcome) welcome.remove();

    const wrapper = document.createElement("div");
    wrapper.className = "msg " + type;

    if (type === "bot") {
        const avatar = document.createElement("div");
        avatar.className = "msg-avatar";
        avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>`;
        wrapper.appendChild(avatar);
    }

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";
    if (isTyping) {
        bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    } else {
        bubble.innerText = text;
    }

    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
    return wrapper;
}

function speak(text) {
    if (!speaking) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "id-ID";
    speechSynthesis.speak(u);
}

async function send(textVoice = null) {
    const input = document.getElementById("input");
    const text = textVoice || input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";
    const typing = addMsg("", "bot", true);

    try {
        const res = await fetch(`${SERVER_URL}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });
        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();
        typing.remove();
        const reply = data.reply || "Tidak ada respons.";
        addMsg(reply, "bot");
        speak(reply);
    } catch (err) {
        typing.remove();
        addMsg("❌ Error: " + err.message, "bot");
    }
}

function voice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Browser tidak support voice 😢"); return; }
    const recog = new SR();
    const micBtn = document.getElementById("micBtn");
    recog.lang = "id-ID";
    recog.start();
    micBtn.classList.add("listening");
    const msg = addMsg("🎤 Mendengarkan...", "bot");
    recog.onresult = e => {
        micBtn.classList.remove("listening");
        msg.remove();
        send(e.results[0][0].transcript);
    };
    recog.onerror = () => {
        micBtn.classList.remove("listening");
        msg.remove();
        addMsg("❌ Gagal mendengar.", "bot");
    };
}
</script>
</body>
</html>
