<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Premium</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; }

/* ===== FLOATING BUTTON ===== */
.chat-toggle {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(99,102,241,0.5);
    transition: 0.3s;
    z-index: 999;
}
.chat-toggle:hover { transform: scale(1.1); box-shadow: 0 6px 25px rgba(99,102,241,0.7); }
.chat-toggle svg { width: 28px; height: 28px; fill: white; }

/* ===== CHATBOX ===== */
.chatbox {
    position: fixed;
    bottom: 100px;
    right: 24px;
    width: 360px;
    height: 520px;
    background: #0f0f1a;
    border: 1px solid rgba(99,102,241,0.3);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: scale(0) translateY(20px);
    transform-origin: bottom right;
    transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    z-index: 998;
}
.chatbox.active { transform: scale(1) translateY(0); }

/* ===== HEADER ===== */
.header {
    padding: 14px 16px;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-bottom: 1px solid rgba(99,102,241,0.2);
    display: flex;
    align-items: center;
    gap: 10px;
}
.header-logo {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.header-logo svg { width: 20px; height: 20px; fill: white; }
.header-info { flex: 1; }
.header-title { color: white; font-size: 14px; font-weight: 600; }
.header-status { color: #4ade80; font-size: 11px; display: flex; align-items: center; gap: 4px; }
.status-dot {
    width: 6px; height: 6px;
    background: #4ade80;
    border-radius: 50%;
    animation: pulse 2s infinite;
}
@keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
}

/* ===== CHAT AREA ===== */
.chat {
    flex: 1;
    padding: 14px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: rgba(99,102,241,0.3) transparent;
}
.chat::-webkit-scrollbar { width: 4px; }
.chat::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 4px; }

/* ===== MESSAGES ===== */
.msg {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    max-width: 85%;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.bot { align-self: flex-start; }

.msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}
.msg-avatar svg { width: 15px; height: 15px; fill: white; }

.msg-bubble {
    padding: 10px 13px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.5;
}
.msg.user .msg-bubble {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    color: white;
    border-bottom-right-radius: 4px;
}
.msg.bot .msg-bubble {
    background: #1e1e2e;
    color: #e2e8f0;
    border-bottom-left-radius: 4px;
    border: 1px solid rgba(99,102,241,0.15);
}

/* Typing dots */
.typing { display: flex; gap: 4px; padding: 4px 2px; }
.typing span {
    width: 7px; height: 7px;
    background: #6366f1;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
}
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
}

/* ===== INPUT AREA ===== */
.input-area {
    padding: 12px;
    background: #0f0f1a;
    border-top: 1px solid rgba(99,102,241,0.15);
    display: flex;
    gap: 8px;
    align-items: center;
}
.input-area input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid rgba(99,102,241,0.25);
    background: #1e1e2e;
    color: #e2e8f0;
    font-size: 13.5px;
    outline: none;
    transition: 0.2s;
}
.input-area input::placeholder { color: #64748b; }
.input-area input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }

.btn {
    width: 40px; height: 40px;
    border: none;
    border-radius: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
    flex-shrink: 0;
}
.btn:hover { transform: scale(1.08); }
.btn svg { width: 18px; height: 18px; }

.btn-send { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
.btn-send svg { fill: white; }

.btn-mic { background: #1e1e2e; border: 1px solid rgba(99,102,241,0.25); }
.btn-mic svg { fill: #f87171; }
.btn-mic.listening { background: #f87171; border-color: #f87171; }
.btn-mic.listening svg { fill: white; }
</style>
</head>
<body>

<!-- Floating Button -->
<div class="chat-toggle" onclick="toggleChat()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 11H7v-2h10v2zm0-3H7V8h10v2z"/>
    </svg>
</div>

<!-- Chatbox -->
<div id="chatbox" class="chatbox">
    <div class="header">
        <div class="header-logo">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
        </div>
        <div class="header-info">
            <div class="header-title">AI Assistant</div>
            <div class="header-status"><span class="status-dot"></span> Online</div>
        </div>
    </div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Ketik pesan..." onkeydown="if(event.key==='Enter') send()">
        <button class="btn btn-mic" id="micBtn" onclick="voice()">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1 1.93c-3.94-.49-7-3.85-7-7.93H2c0 4.42 3.05 8.12 7 9.29V21h2v-3.07c.33.05.66.07 1 .07s.67-.02 1-.07V21h2v-3.78c3.95-1.17 7-4.87 7-9.22h-2c0 4.08-3.06 7.44-7 7.93z"/></svg>
        </button>
        <button class="btn btn-send" onclick="send()">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
const SERVER_URL = "https://chatbot-backend-production-540f.up.railway.app";
let speaking = true;

function toggleChat() {
    document.getElementById("chatbox").classList.toggle("active");
}

function addMsg(text, type, isTyping = false) {
    const chat = document.getElementById("chat");
    const wrapper = document.createElement("div");
    wrapper.className = "msg " + type;

    if (type === "bot") {
        const avatar = document.createElement("div");
        avatar.className = "msg-avatar";
        avatar.innerHTML = `<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>`;
        wrapper.appendChild(avatar);
    }

    const bubble = document.createElement("div");
    bubble.className = "msg-bubble";

    if (isTyping) {
        bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    } else {
        bubble.innerText = text;
    }

    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;
    return wrapper;
}

function speak(text) {
    if (!speaking) return;
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "id-ID";
    speechSynthesis.speak(utter);
}

async function send(textVoice = null) {
    const input = document.getElementById("input");
    const text = textVoice || input.value.trim();
    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    const typingMsg = addMsg("", "bot", true);

    try {
        const res = await fetch(`${SERVER_URL}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: text })
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);
        const data = await res.json();

        typingMsg.remove();
        const reply = data.reply || "Tidak ada respons dari AI.";
        addMsg(reply, "bot");
        speak(reply);

    } catch (err) {
        typingMsg.remove();
        addMsg("❌ Error: " + err.message, "bot");
        console.error(err);
    }
}

function voice() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert("Browser tidak support voice recognition 😢"); return; }

    const recog = new SR();
    const micBtn = document.getElementById("micBtn");
    recog.lang = "id-ID";
    recog.start();

    micBtn.classList.add("listening");
    const listeningMsg = addMsg("🎤 Mendengarkan...", "bot");

    recog.onresult = e => {
        micBtn.classList.remove("listening");
        listeningMsg.remove();
        send(e.results[0][0].transcript);
    };

    recog.onerror = () => {
        micBtn.classList.remove("listening");
        listeningMsg.remove();
        addMsg("❌ Gagal mendengar, coba lagi.", "bot");
    };
}
</script>
</body>
</html>
