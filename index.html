<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot AI Floating</title>

<style>
body {
    margin: 0;
    font-family: Arial;
}

/* 🔘 Tombol bulat */
.chat-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #1a73e8;
    color: white;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-size: 25px;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* 💬 Box chatbot */
.chat-box {
    position: fixed;
    bottom: 90px;
    right: 20px;
    width: 320px;
    height: 420px;
    background: #343541;
    color: white;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    overflow: hidden;
}

/* Header */
.header {
    background: #202123;
    padding: 10px;
    text-align: center;
}

/* Chat */
.chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    margin: 5px 0;
}

.user { text-align: right; color: #58a6ff; }
.bot { text-align: left; }

/* Input */
.input-area {
    display: flex;
}

.input-area input {
    flex: 1;
    padding: 10px;
    border: none;
}

.input-area button {
    padding: 10px;
    border: none;
    background: #19c37d;
    color: white;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔘 Tombol -->
<div class="chat-toggle">
  <img src="logo.png" width="30">
</div>

<!-- 💬 Chatbot -->
<div id="chatbox" class="chat-box">
    <div class="header">AI Chatbot</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Tanya sesuatu...">
        <button onclick="send()">Kirim</button>
    </div>
</div>

<script>
const API_KEY = "AIzaSyCkS2iGGfXEiJ0XuRIom0xZYvm_JNz43GI";

let history = [];

function toggleChat() {
    let box = document.getElementById("chatbox");
    box.style.display = box.style.display === "flex" ? "none" : "flex";
}

function addMsg(text, type) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    let input = document.getElementById("input");
    let text = input.value;

    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    addMsg("Mengetik...", "bot");

    history.push({ text });

    try {
        let res = await fetch(
            "https://generativelanguage.googleapis.com/v1/models/gemini-pro:generateContent?key=" + API_KEY,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: history.map(h => ({
                        parts: [{ text: h.text }]
                    }))
                })
            }
        );

        let data = await res.json();
        document.querySelector(".bot:last-child").remove();

        let reply = data.candidates[0].content.parts[0].text;
        addMsg(reply, "bot");

        history.push({ text: reply });

    } catch {
        addMsg("Error koneksi AI", "bot");
    }
}
</script>

</body>
</html>
