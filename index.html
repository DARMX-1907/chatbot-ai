<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot Premium</title>

<style>
body { margin: 0; font-family: Arial; }

.chat-toggle img {
    width: 30px;
    height: 30px;
}

/* 🔘 Floating Button */
.chat-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #1a73e8, #19c37d);
    width: 65px;
    height: 65px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    color: white;
    font-size: 26px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    transition: 0.3s;
}
.chat-toggle:hover { transform: scale(1.1); }

/* 💬 Chatbox */
.chatbox {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 350px;
    height: 500px;
    backdrop-filter: blur(15px);
    background: rgba(40,40,40,0.85);
    border-radius: 15px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: scale(0);
    transform-origin: bottom right;
    transition: 0.3s ease;
}
.chatbox.active { transform: scale(1); }

/* Header */
.header {
    padding: 12px;
    text-align: center;
    background: rgba(0,0,0,0.5);
}

/* Chat */
.chat {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg { margin: 8px 0; }
.user { text-align: right; color: #58a6ff; }
.bot { text-align: left; color: #e6e6e6; }

/* Input */
.input-area {
    display: flex;
    padding: 8px;
}

.input-area input {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
}

.input-area button {
    margin-left: 5px;
    border: none;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.send { background: #19c37d; color: white; }
.mic { background: #ff4d4d; color: white; }
</style>
</head>

<body>

<!-- 🔘 Floating Button -->
<div class="chat-toggle">
    <img src="logo.png" width="30">
</div>

<!-- 💬 Chatbox -->
<div id="chatbox" class="chatbox">
    <div class="header">✨ AI Assistant</div>

    <div id="chat" class="chat"></div>

    <div class="input-area">
        <input id="input" placeholder="Ketik atau bicara...">
        <button class="send" onclick="send()">➤</button>
        <button class="mic" onclick="voice()">🎤</button>
    </div>
</div>

<script>
const API_KEY = "AIzaSyCkS2iGGfXEiJ0XuRIom0xZYvm_JNz43GI";

let history = [];
let speaking = true;

function toggleChat() {
    document.getElementById("chatbox").classList.toggle("active");
}

function addMsg(text, type) {
    let chat = document.getElementById("chat");
    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

// 🔊 SPEAK
function speak(text) {
    if (!speaking) return;
    let utter = new SpeechSynthesisUtterance(text);
    utter.lang = "id-ID";
    speechSynthesis.speak(utter);
}

// 💬 SEND
async function send(textVoice = null) {
    let input = document.getElementById("input");
    let text = textVoice || input.value;

    if (!text) return;

    addMsg(text, "user");
    input.value = "";

    addMsg("Mengetik...", "bot");

    history.push({ text });

    try {
        const response = await fetch(
                "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: history.map(h => ({
                        parts: [{ text: h.text }]
                    }))
                })
            }
        );

        let data = await res.json();
        document.querySelector(".bot:last-child").remove();

        let reply = data.candidates[0].content.parts[0].text;
        addMsg(reply, "bot");

        speak(reply);

        history.push({ text: reply });

    } catch {
        addMsg("Error AI", "bot");
    }
}

// 🎤 VOICE
function voice() {
    let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        alert("Browser tidak support 😢");
        return;
    }

    let recog = new SpeechRecognition();
    recog.lang = "id-ID";
    recog.start();

    addMsg("🎤 Mendengarkan...", "bot");

    recog.onresult = e => {
        let text = e.results[0][0].transcript;
        send(text);
    };
}
</script>

</body>
</html>
